name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # pnpm version is read from package.json `packageManager` field

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # pnpm v11 ignores onlyBuiltDependencies under our current config and
        # exits 1 on ERR_PNPM_IGNORED_BUILDS. We install with --ignore-scripts
        # to skip the check, then run the postinstall steps we actually need.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run approved build scripts
        run: |
          pnpm --filter @interfluo/web run copy:pdf-worker || (cd apps/web && pnpm run copy:pdf-worker)
          pnpm rebuild esbuild sharp @biomejs/biome

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint and format check
        run: pnpm exec biome check .

      - name: Build
        run: pnpm build
